<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Estudiantes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            color: white;
        }
        #btn-evaluar { background-color: #4CAF50; }
        #btn-limpiar { background-color: #f44336; }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Evaluación de Estudiantes</h1>

    <div class="form-group">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" placeholder="Ingrese su nombre">
    </div>

    <div class="form-group">
        <label for="carrera">Carrera:</label>
        <input type="text" id="carrera" placeholder="Ingrese su carrera">
    </div>

    <div class="form-group">
        <label for="nota1">Nota 1:</label>
        <input type="text" id="nota1" placeholder="Ingrese nota 1">
    </div>

    <div class="form-group">
        <label for="nota2">Nota 2:</label>
        <input type="text" id="nota2" placeholder="Ingrese nota 2">
    </div>

    <div class="form-group">
        <label for="nota3">Nota 3:</label>
        <input type="text" id="nota3" placeholder="Ingrese nota 3">
    </div>

    <div class="buttons">
        <button id="btn-evaluar">Evaluar</button>
        <button id="btn-limpiar">Limpiar</button>
    </div>

    <div id="resultado"></div>

    <script src="app.js"></script>
</body>
</html>
